version: 2

models:

  - name: drug_shortage_episodes
    description: "Drug shortage episodes tracking the start, end, and duration of different shortage statuses for each drug"
    columns:
      - name: generic_name
        description: "Generic name of the drug"
        tests:
          - not_null
      - name: company_name
        description: "Name of the pharmaceutical company"
      - name: presentation
        description: "Drug presentation/formulation"
      - name: therapeutic_category
        description: "Therapeutic category of the drug"
      - name: shortage_status
        description: "Shortage status (new, continued, ended, discontinued)"
        tests:
          - not_null
          - accepted_values:
              values: ['new', 'continued', 'ended', 'discontinued']
      - name: episode_start_date
        description: "Start date of the shortage episode"
        tests:
          - not_null
      - name: episode_end_date
        description: "End date of the shortage episode"
        tests:
          - not_null
      - name: episode_duration_days
        description: "Duration of the episode in days"
        tests:
          - not_null
      - name: drug_display_name
        description: "Formatted display name for visualizations (generic name + company name)"
      - name: status_color
        description: "Color code for status visualization in charts"

  - name: mart_shortage_characteristics
    description: "Drug shortage characteristics for pie charts. One row per drug_identifier with route_category, single_source, and date range. Excludes discontinued drugs."
    columns:
      - name: drug_identifier
        description: "Unique drug identifier (substance_name + route_category)"
        tests:
          - not_null
      - name: route_category
        description: "Route of administration category (injectable, oral, topical, etc.)"
      - name: single_source
        description: "Whether the drug is single source"
      - name: first_update_date
        description: "Earliest update date for this drug"
      - name: last_update_date
        description: "Latest update date for this drug"

  - name: mart_shortage_survival
    description: "Kaplan-Meier survival data. One row per drug_identifier shortage episode with duration and resolution status. Excludes discontinued drugs."
    columns:
      - name: drug_identifier
        description: "Unique drug identifier (substance_name + route_category)"
        tests:
          - not_null
      - name: route_category
        description: "Route of administration category"
      - name: single_source
        description: "Whether the drug is single source"
      - name: shortage_start_date
        description: "Date shortage started (first new/continued status)"
      - name: resolution_date
        description: "Date shortage resolved (first ended status), null if censored"
      - name: resolved
        description: "Whether the shortage was resolved (true) or censored (false)"
      - name: duration_days
        description: "Days from shortage start to resolution or current date"